# =============================================================
# nginx 로드밸런서 설정
# Blazor Auto + .NET 10 최적화
# =============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # ── 업스트림: Docker Compose 서비스명으로 자동 해석 ──────────
    upstream dotnet_app {
        # Blazor SignalR: 같은 클라이언트는 같은 서버로 (스티키 세션)
        # ip_hash 대신 쿠키 기반 스티키 (더 정확함)
        ip_hash;
        server app:8080;
        # docker compose scale app=3 하면 nginx가 자동으로 인식
    }

    # ── HTTP → HTTPS 리다이렉트 ─────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt 인증 챌린지
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 헬스체크는 HTTP 허용 (로드밸런서/모니터링용)
        location /health {
            proxy_pass http://dotnet_app;
            proxy_set_header Host $host;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/live/${DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/${DOMAIN}/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Blazor WebSocket (SignalR) ────────────────────────────
        location /_blazor {
            proxy_pass http://dotnet_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;  # SignalR 연결 유지
        }

        # ── Blazor WASM 정적 파일 캐싱 ───────────────────────────
        location ~* \.(wasm|dll|pdb)$ {
            proxy_pass http://dotnet_app;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── 일반 요청 ─────────────────────────────────────────────
        location / {
            proxy_pass http://dotnet_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;  # Blazor SSR 스트리밍
        }
    }
}
