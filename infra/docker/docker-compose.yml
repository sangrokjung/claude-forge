# =============================================================
# Self-hosted 배포용 docker-compose
# 사용법: docker compose --env-file .env up -d
# =============================================================

services:

  # ── 앱 (수평 확장) ─────────────────────────────────────────
  app:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME}:${IMAGE_TAG:-latest}
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    deploy:
      replicas: ${APP_REPLICAS:-2}
      resources:
        limits:
          cpus: '1'
          memory: 512M
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: ${SUPABASE_CONNECTION_STRING}
      Supabase__Url: ${SUPABASE_URL}
      Supabase__AnonKey: ${SUPABASE_ANON_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - internal
    expose:
      - "8080"

  # ── nginx 로드밸런서 ────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro          # Let's Encrypt 인증서 마운트
      - nginx_logs:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal
      - external

  # ── Certbot (Let's Encrypt 자동 갱신) ──────────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./ssl:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done"
    profiles:
      - ssl    # docker compose --profile ssl up -d 로만 실행

volumes:
  nginx_logs:
  certbot_webroot:

networks:
  internal:
    internal: true
  external:
    driver: bridge
